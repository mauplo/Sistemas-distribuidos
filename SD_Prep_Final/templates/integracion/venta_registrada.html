<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Venta registrada</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffdf8;
            --line: #d7c7b4;
            --text: #1f1a17;
            --muted: #6e6259;
            --accent: #166534;
            --accent-soft: #dcfce7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Georgia, "Times New Roman", serif;
            background: radial-gradient(circle at top, #efe7dc 0%, var(--bg) 65%);
            color: var(--text);
        }

        .card {
            width: min(560px, 100%);
            padding: 28px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 22px 48px rgba(79, 55, 33, 0.12);
        }

        .status {
            display: inline-block;
            margin-bottom: 14px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: bold;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 5vw, 2.8rem);
        }

        p {
            margin: 0 0 10px;
            line-height: 1.6;
        }

        .details {
            margin: 20px 0;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #faf4eb;
        }

        .details p:last-child {
            margin-bottom: 0;
        }

        .label {
            color: var(--muted);
            font-weight: bold;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="status">Venta registrada</span>
        <h1>Operacion completada</h1>
        <p>La venta se envio al servicio correspondiente y se guardo correctamente en la base local.</p>

        <section class="details">
            <p><span class="label">Tienda:</span> {{ venta.tienda_id }}</p>
            <p><span class="label">Monto:</span> ${{ venta.monto }}</p>
            <p><span class="label">Servicio:</span> {{ venta.servicio }}</p>
            <p><span class="label">Fecha:</span> {{ venta.creada_en }}</p>
        </section>

        <a href="/">Volver a la pagina principal</a>
    </main>
</body>
</html>
